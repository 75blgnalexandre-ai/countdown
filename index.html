<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATRAS - Basement | Bientôt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #060B1A;
            color: #fff;
            font-family: 'Inter', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== BACKGROUND IMAGE (Batsignal) ===== */
        #bgImage {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.5) saturate(1.3) contrast(1.1);
            transform: perspective(900px) rotateX(1.5deg) scale(1.04);
            transform-origin: center center;
            animation: bgFloat 25s ease-in-out infinite;
        }
        @keyframes bgFloat {
            0%, 100% { transform: perspective(900px) rotateX(1.5deg) rotateY(0deg) scale(1.04); }
            25% { transform: perspective(900px) rotateX(1deg) rotateY(0.8deg) scale(1.05); }
            50% { transform: perspective(900px) rotateX(2deg) rotateY(-0.3deg) scale(1.03); }
            75% { transform: perspective(900px) rotateX(1.2deg) rotateY(0.4deg) scale(1.06); }
        }

        /* ===== FOG / LIGHT VIDEO ===== */
        #fogVideo {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 1;
            mix-blend-mode: screen;
            opacity: 0.35;
            pointer-events: none;
        }

        /* Dark overlay gradient — bleu nuit tones */
        #bgOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(6,11,26,0.1) 0%, rgba(6,11,26,0.6) 50%, rgba(6,11,26,0.92) 100%),
                linear-gradient(180deg, rgba(6,11,26,0.4) 0%, transparent 25%, transparent 75%, rgba(6,11,26,0.6) 100%);
            pointer-events: none;
        }

        /* ===== BAT CURSOR ===== */
        #batCursor {
            position: fixed;
            width: 72px; height: 42px;
            pointer-events: none;
            z-index: 99999;
            background-image: url("assets/cursor_sprite.png");
            background-size: auto 100%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.2s;
        }
        #batCursor.visible { opacity: 1; }

        /* ===== SUBTLE GLOW — bleu nuit tint ===== */
        #spotlight {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            width: 140px; height: 140px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(140,170,255,0.06) 0%, rgba(100,140,220,0.02) 40%, transparent 70%);
            mix-blend-mode: screen;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #spotlight.active { opacity: 1; }

        /* ===== BAT VIDEOS ===== */
        .bat-video-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            pointer-events: none;
            z-index: 9000;
            mix-blend-mode: multiply;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .bat-video-overlay.show { opacity: 1; }
        .bat-video-overlay.fade-out { opacity: 0; transition: opacity 1.2s; }

        /* ===== MAIN CONTENT ===== */
        .content {
            position: relative;
            z-index: 100;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Logo — harmonized with bleu nuit glow */
        .logo-link { display: inline-block; cursor: none; margin-bottom: 16px; }
        .logo-link img {
            height: 110px; width: auto;
            filter: drop-shadow(0 0 20px rgba(100,150,255,0.3)) drop-shadow(0 0 40px rgba(60,100,200,0.15));
            transition: filter 0.3s, transform 0.3s;
        }
        .logo-link:hover img {
            filter: drop-shadow(0 0 30px rgba(100,150,255,0.5)) drop-shadow(0 0 60px rgba(60,100,200,0.25));
            transform: scale(1.08);
        }

        /* Subtitle */
        .subtitle {
            font-size: 22px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: rgba(140,170,220,0.5);
            margin-bottom: 60px;
            font-weight: 700;
        }

        /* ===== COUNTDOWN — bleu nuit palette ===== */
        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }
        .countdown-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
        }
        .countdown-value {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            color: #A8C4F0;
            text-shadow:
                0 0 30px rgba(100,150,240,0.3),
                0 0 60px rgba(60,100,200,0.15);
            font-variant-numeric: tabular-nums;
            transition: transform 0.3s ease;
        }
        .countdown-value.tick {
            transform: scale(1.1);
        }
        .countdown-label {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(140,170,220,0.35);
            margin-top: 10px;
            font-weight: 400;
        }
        .countdown-separator {
            font-size: 56px;
            font-weight: 300;
            color: rgba(100,150,240,0.2);
            align-self: flex-start;
            padding-top: 8px;
        }

        /* Progress bar — bleu nuit */
        .progress-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 2px;
            background: rgba(100,150,240,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4A7BD4, #A8C4F0);
            border-radius: 2px;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(74,123,212,0.3);
        }
        .progress-text {
            font-size: 11px;
            color: rgba(140,170,220,0.25);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Release label */
        .release-date {
            font-size: 13px;
            color: rgba(140,170,220,0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Spotify hint — bleu nuit border */
        .spotify-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid rgba(29,185,84,0.2);
            background: rgba(29,185,84,0.05);
            color: rgba(29,185,84,0.6);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            cursor: none;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .spotify-link:hover {
            border-color: rgba(29,185,84,0.5);
            background: rgba(29,185,84,0.1);
            color: #1DB954;
            box-shadow: 0 0 20px rgba(29,185,84,0.12);
        }
        .spotify-link svg { width: 16px; height: 16px; fill: currentColor; }

        /* ===== INTRO ===== */
        #introOverlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #060B1A;
            z-index: 20000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 1s;
            cursor: none;
        }
        #introOverlay.fade { opacity: 0; pointer-events: none; }
        #introLogo {
            height: 120px; width: auto;
            filter: drop-shadow(0 0 20px rgba(100,150,255,0.3));
            animation: logoPulse 2s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(100,150,255,0.25)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 35px rgba(100,150,255,0.5)); transform: scale(1.03); }
        }
        #introText {
            margin-top: 20px; font-size: 13px;
            letter-spacing: 4px; text-transform: uppercase;
            color: rgba(140,170,220,0.3);
            animation: textFade 1.5s ease-in-out infinite;
        }
        @keyframes textFade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        /* ===== PARTICLES — bleu nuit ===== */
        .particle {
            position: fixed;
            width: 2px; height: 2px;
            background: rgba(100,150,240,0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }

        /* ===== RELEASED STATE ===== */
        .released-message {
            display: none;
            font-size: 28px;
            font-weight: 700;
            color: #A8C4F0;
            text-shadow: 0 0 40px rgba(100,150,240,0.4);
            margin-bottom: 20px;
            animation: releasePulse 2s ease-in-out infinite;
        }
        @keyframes releasePulse {
            0%, 100% { text-shadow: 0 0 30px rgba(100,150,240,0.3); }
            50% { text-shadow: 0 0 60px rgba(100,150,240,0.6); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .countdown { gap: 10px; }
            .countdown-value { font-size: 42px; }
            .countdown-block { min-width: 60px; }
            .countdown-separator { font-size: 36px; }
            .countdown-label { font-size: 9px; letter-spacing: 2px; }
            .subtitle { font-size: 16px; letter-spacing: 6px; margin-bottom: 40px; }
            .logo-link img { height: 80px; }
        }
        @media (max-width: 380px) {
            .countdown-value { font-size: 32px; }
            .countdown-block { min-width: 50px; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND IMAGE (Batsignal) -->
    <img id="bgImage" src="assets/background.jpg" alt="">

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/bg_music.mp3" type="audio/mpeg">
    </audio>

    <!-- FOG / LIGHT BEAM VIDEO (looping, blended) -->
    <video id="fogVideo" autoplay muted loop playsinline preload="auto">
        <source src="assets/fog_light.mp4" type="video/mp4">
    </video>

    <!-- Dark overlay -->
    <div id="bgOverlay"></div>

    <!-- INTRO -->
    <div id="introOverlay">
        <img id="introLogo" src="assets/logo.png" alt="Fatras">
        <div id="introText">Entrer</div>
    </div>

    <!-- CURSOR + SPOTLIGHT -->
    <div id="batCursor"></div>
    <div id="spotlight"></div>

    <!-- BAT VIDEOS -->
    <video id="batsV1" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats1.mp4" type="video/mp4"></video>
    <video id="batsV2" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats2.mp4" type="video/mp4"></video>
    <video id="batsV3" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats3.mp4" type="video/mp4"></video>
    <video id="batsV4" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats4.mp4" type="video/mp4"></video>
    <video id="batsV5" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats5.mp4" type="video/mp4"></video>
    <video id="batsV6" class="bat-video-overlay" muted playsinline preload="auto"><source src="assets/bats6.mp4" type="video/mp4"></video>

    <!-- MAIN CONTENT -->
    <div class="content">
        <a class="logo-link" href="https://open.spotify.com/intl-fr/artist/5axdapUVsbVkJVGVjybfQT?si=eEgBcciuRaOqfWdEkAbFMA" target="_blank" rel="noopener">
            <img src="assets/logo.png" alt="Fatras - Spotify">
        </a>

        <div class="subtitle">Basement</div>

        <!-- Countdown -->
        <div class="countdown" id="countdown">
            <div class="countdown-block">
                <div class="countdown-value" id="cdDays">--</div>
                <div class="countdown-label">Jours</div>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-block">
                <div class="countdown-value" id="cdHours">--</div>
                <div class="countdown-label">Heures</div>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-block">
                <div class="countdown-value" id="cdMinutes">--</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-block">
                <div class="countdown-value" id="cdSeconds">--</div>
                <div class="countdown-label">Secondes</div>
            </div>
        </div>

        <div class="release-date">24 Avril 2026 &bull; Minuit</div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText"></div>
        </div>

        <div class="released-message" id="releasedMsg">BASEMENT EST DISPONIBLE</div>

        <a class="spotify-link" href="https://open.spotify.com/intl-fr/artist/5axdapUVsbVkJVGVjybfQT?si=eEgBcciuRaOqfWdEkAbFMA" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
            Suivre sur Spotify
        </a>
    </div>

    <script>
    // ===== TARGET DATE: 24 Avril 2026 at 00:00 (Paris time) =====
    const RELEASE_DATE = new Date("2026-04-24T00:00:00+02:00"); // CEST (Paris summer time)
    const COUNTDOWN_START = new Date("2026-03-24T00:00:00+01:00");

    // ===== BAT VIDEOS =====
    const batVideos = [
        document.getElementById("batsV1"), document.getElementById("batsV2"),
        document.getElementById("batsV3"), document.getElementById("batsV4"),
        document.getElementById("batsV5"), document.getElementById("batsV6")
    ];
    let batIndex = 0;

    const batSfx = new Audio("assets/bats_sfx.mp3");
    batSfx.volume = 0.5;

    function playBatVideo(video) {
        video.currentTime = 0;
        video.classList.add("show");
        video.play();
        const sfx = batSfx.cloneNode();
        sfx.volume = 0.4;
        sfx.play().catch(() => {});
        video.onended = () => {
            video.classList.add("fade-out");
            video.classList.remove("show");
            setTimeout(() => video.classList.remove("fade-out"), 1200);
        };
    }

    function playRandomBats() {
        playBatVideo(batVideos[batIndex % batVideos.length]);
        batIndex++;
        setTimeout(() => {
            playBatVideo(batVideos[batIndex % batVideos.length]);
            batIndex++;
        }, 500);
    }

    // ===== COUNTDOWN =====
    const elDays = document.getElementById("cdDays");
    const elHours = document.getElementById("cdHours");
    const elMinutes = document.getElementById("cdMinutes");
    const elSeconds = document.getElementById("cdSeconds");
    const elProgress = document.getElementById("progressFill");
    const elProgressText = document.getElementById("progressText");
    const elReleasedMsg = document.getElementById("releasedMsg");

    let lastMinute = -1;
    let introClicked = false;

    function pad(n) { return n.toString().padStart(2, "0"); }

    function updateCountdown() {
        const now = new Date();
        const diff = RELEASE_DATE - now;

        if (diff <= 0) {
            elDays.textContent = "00";
            elHours.textContent = "00";
            elMinutes.textContent = "00";
            elSeconds.textContent = "00";
            elReleasedMsg.style.display = "block";
            elProgress.style.width = "100%";
            elProgressText.textContent = "DISPONIBLE MAINTENANT";
            playRandomBats();
            return;
        }

        const totalSec = Math.floor(diff / 1000);
        const days = Math.floor(totalSec / 86400);
        const hours = Math.floor((totalSec % 86400) / 3600);
        const minutes = Math.floor((totalSec % 3600) / 60);
        const seconds = totalSec % 60;

        updateDigit(elDays, pad(days));
        updateDigit(elHours, pad(hours));
        updateDigit(elMinutes, pad(minutes));
        updateDigit(elSeconds, pad(seconds));

        // Progress bar
        const totalDuration = RELEASE_DATE - COUNTDOWN_START;
        const elapsed = now - COUNTDOWN_START;
        const pct = Math.min(100, Math.max(0, (elapsed / totalDuration) * 100));
        elProgress.style.width = pct.toFixed(2) + "%";

        const daysLeft = Math.ceil(diff / 86400000);
        elProgressText.textContent = daysLeft + " jour" + (daysLeft > 1 ? "s" : "") + " restant" + (daysLeft > 1 ? "s" : "");

        // Every 2 minutes → trigger bats
        if (introClicked && minutes !== lastMinute && lastMinute !== -1 && minutes % 2 === 0) {
            playRandomBats();
        }
        lastMinute = minutes;
    }

    function updateDigit(el, newVal) {
        if (el.textContent !== newVal) {
            el.textContent = newVal;
            el.classList.add("tick");
            setTimeout(() => el.classList.remove("tick"), 300);
        }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ===== CURSOR =====
    const batCursor = document.getElementById("batCursor");
    const SPRITE_FRAMES = 12, FRAME_W = 72;
    let cursorFrame = 0;
    setInterval(() => {
        cursorFrame = (cursorFrame + 1) % SPRITE_FRAMES;
        batCursor.style.backgroundPositionX = -(cursorFrame * FRAME_W) + "px";
    }, 83);

    const spotlightEl = document.getElementById("spotlight");
    document.addEventListener("mousemove", (e) => {
        batCursor.style.left = e.clientX + "px";
        batCursor.style.top = e.clientY + "px";
        batCursor.classList.add("visible");
        spotlightEl.style.left = e.clientX + "px";
        spotlightEl.style.top = e.clientY + "px";
        spotlightEl.classList.add("active");
    });
    document.addEventListener("mouseleave", () => {
        batCursor.classList.remove("visible");
        spotlightEl.classList.remove("active");
    });

    // ===== FLOATING PARTICLES =====
    function createParticles() {
        for (let i = 0; i < 20; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.top = Math.random() * 100 + "vh";
            p.style.opacity = Math.random() * 0.2 + 0.05;
            p.style.width = p.style.height = (Math.random() * 2 + 1) + "px";
            document.body.appendChild(p);
            animateParticle(p);
        }
    }

    function animateParticle(p) {
        const duration = Math.random() * 15000 + 10000;
        const startX = parseFloat(p.style.left);
        const startY = parseFloat(p.style.top);
        const endX = startX + (Math.random() - 0.5) * 30;
        const endY = startY - Math.random() * 20 - 5;
        const startTime = Date.now();

        function step() {
            const elapsed = Date.now() - startTime;
            const t = Math.min(1, elapsed / duration);
            const eased = t * (2 - t);
            p.style.left = (startX + (endX - startX) * eased) + "vw";
            p.style.top = (startY + (endY - startY) * eased) + "vh";
            p.style.opacity = (1 - t) * 0.15;

            if (t < 1) {
                requestAnimationFrame(step);
            } else {
                p.style.left = Math.random() * 100 + "vw";
                p.style.top = (80 + Math.random() * 20) + "vh";
                p.style.opacity = Math.random() * 0.15 + 0.05;
                animateParticle(p);
            }
        }
        requestAnimationFrame(step);
    }

    // ===== INTRO =====
    document.getElementById("introOverlay").addEventListener("click", () => {
        introClicked = true;
        document.getElementById("introOverlay").classList.add("fade");
        setTimeout(() => document.getElementById("introOverlay").style.display = "none", 1000);
        // Start fog video (needs user interaction for autoplay)
        const fog = document.getElementById("fogVideo");
        fog.play().catch(() => {});
        // Start background music
        const bgMusic = document.getElementById("bgMusic");
        bgMusic.volume = 0.3;
        bgMusic.play().catch(() => {});
        // Grand entrance with bats
        playBatVideo(batVideos[0]);
        setTimeout(() => playBatVideo(batVideos[1]), 600);
        setTimeout(() => playBatVideo(batVideos[2]), 1200);
        // Start particles
        createParticles();
    });
    </script>
</body>
</html>
